<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Paste Runner" />
  <title>Paste Runner V3</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-brand">
      <img src="DC_LOGO.jpg" alt="Doherty Corp" class="logo" />
      <div>
        <h1>Paste Runner Sheet</h1>
        <p>Doherty Corp · V3</p>
      </div>
    </div>
    <button id="testBtn" class="btn ghost">Send Test</button>
  </header>
  <main class="wrap">
    <section class="card">
      <h2>Shift Details</h2>
      <div class="grid">
        <label class="required">Date <input id="shift_date" type="date"></label>
        <label class="required">Shift
          <select id="shift_type">
            <option value="D/S">D/S</option>
            <option value="N/S">N/S</option>
          </select>
        </label>
        <label class="required">Operator <input id="operator" type="text" placeholder="Operator name"></label>
        <label>Shift Boss <input id="shift_boss" type="text"></label>
        <label>Plant Operator <input id="plant_operator" type="text"></label>
        <label>Paste Runner <input id="paste_runner" type="text"></label>
      </div>
    </section>
    <section class="card">
      <h2>Stopes</h2>
      <div class="stope-grid" id="stopesContainer">
        <!-- Stope cards are generated dynamically by app.js (createStopeCard).
             The form starts with NO cards — the user adds each one with
             "+ Add Stope" below, names it, and can remove any of them. -->
      </div>
      <button type="button" id="addStopeBtn" class="btn add-stope-btn">+ Add Stope</button>
    </section>
    <section class="card">
      <h2>Level Checks</h2>
      <div class="level-check-table" id="levelsContainer">
        <div class="level-check-row" data-level-row="1">
          <label class="level-check-level">Level 1 <input id="level_1_name" data-level-name data-level-index="1" type="text" placeholder="e.g. 1450 Level"></label>
          <label class="level-check-time">Time <input id="level_1_time" data-level-time type="text" readonly placeholder="--:--"></label>
          <input type="hidden" id="level_1_timestamp_full" data-level-full value="">
        </div>
        <div class="level-check-row" data-level-row="2">
          <label class="level-check-level">Level 2 <input id="level_2_name" data-level-name data-level-index="2" type="text" placeholder="e.g. 1380 Level"></label>
          <label class="level-check-time">Time <input id="level_2_time" data-level-time type="text" readonly placeholder="--:--"></label>
          <input type="hidden" id="level_2_timestamp_full" data-level-full value="">
        </div>
        <div class="level-check-row" data-level-row="3">
          <label class="level-check-level">Level 3 <input id="level_3_name" data-level-name data-level-index="3" type="text" placeholder="e.g. 1260 Level"></label>
          <label class="level-check-time">Time <input id="level_3_time" data-level-time type="text" readonly placeholder="--:--"></label>
          <input type="hidden" id="level_3_timestamp_full" data-level-full value="">
        </div>
        <div class="level-check-row" data-level-row="4">
          <label class="level-check-level">Level 4 <input id="level_4_name" data-level-name data-level-index="4" type="text" placeholder="Level name"></label>
          <label class="level-check-time">Time <input id="level_4_time" data-level-time type="text" readonly placeholder="--:--"></label>
          <input type="hidden" id="level_4_timestamp_full" data-level-full value="">
        </div>
        <div class="level-check-row" data-level-row="5">
          <label class="level-check-level">Level 5 <input id="level_5_name" data-level-name data-level-index="5" type="text" placeholder="Level name"></label>
          <label class="level-check-time">Time <input id="level_5_time" data-level-time type="text" readonly placeholder="--:--"></label>
          <input type="hidden" id="level_5_timestamp_full" data-level-full value="">
        </div>
        <div class="level-check-row" data-level-row="6">
          <label class="level-check-level">Level 6 <input id="level_6_name" data-level-name data-level-index="6" type="text" placeholder="Level name"></label>
          <label class="level-check-time">Time <input id="level_6_time" data-level-time type="text" readonly placeholder="--:--"></label>
          <input type="hidden" id="level_6_timestamp_full" data-level-full value="">
        </div>
      </div>
    </section>
    <section class="submit-card">
      <button id="submitBtn" class="btn primary">Submit Shift Sheet</button>
      <div id="status" class="status"></div>
    </section>
  </main>
  <!-- ============================================================
       HIDDEN PDF TEMPLATE
       Not display:none (html2canvas cannot render display:none).
       Pushed off-screen instead, populated by populatePdfTemplate()
       in app.js just before submit, then captured by html2canvas.
       ============================================================ -->
  <div id="pdfTemplateWrapper" aria-hidden="true">
    <div id="pdfTemplate" class="pdf-page">
      <div class="pdf-header">
        <img src="DC_LOGO.jpg" alt="Doherty Corp" class="pdf-logo" />
        <div class="pdf-header-text">
          <h1>Paste Runner Sheet</h1>
          <p>Doherty Corp &middot; Underground Paste Fill Report</p>
        </div>
      </div>

      <div class="pdf-meta-bar">
        <div><span>Date</span><strong id="pdf_shift_date">—</strong></div>
        <div><span>Shift</span><strong id="pdf_shift_type">—</strong></div>
        <div><span>Operator</span><strong id="pdf_operator">—</strong></div>
      </div>

      <div class="pdf-section">
        <h2 class="pdf-section-title">Shift Details</h2>
        <table class="pdf-table">
          <tr>
            <td class="label">Shift Boss</td><td id="pdf_shift_boss">—</td>
            <td class="label">Plant Operator</td><td id="pdf_plant_operator">—</td>
          </tr>
          <tr>
            <td class="label">Paste Runner</td><td id="pdf_paste_runner">—</td>
            <td class="label"></td><td></td>
          </tr>
        </table>
      </div>

      <div class="pdf-section">
        <h2 class="pdf-section-title">Stopes</h2>
        <div id="pdfStopesContainer">
          <!-- Rebuilt fresh by populatePdfTemplate() before every PDF capture,
               one card per current stope in the form, in order. -->
        </div>
      </div>

      <div class="pdf-section">
        <h2 class="pdf-section-title">Level Checks</h2>
        <div id="pdfLevelsContainer" class="pdf-level-list">
          <!-- Rebuilt fresh by populatePdfTemplate() before every PDF capture.
               Only levels with a name entered are shown; empty rows are
               omitted. -->
        </div>
      </div>

      <div class="pdf-footer">
        Generated by Paste Runner Sheet &middot; Doherty Corp &middot; <span id="pdf_generated_at"></span>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
