<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Paste Runner" />
  <title>Paste Runner V3</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-brand">
      <img src="DC_LOGO.jpg" alt="Doherty Corp" class="logo" />
      <div>
        <h1>Paste Runner Sheet</h1>
        <p>Doherty Corp · V3</p>
      </div>
    </div>
    <button id="testBtn" class="btn ghost">Send Test</button>
  </header>
  <main class="wrap">
    <section class="card">
      <h2>Shift Details</h2>
      <div class="grid">
        <label class="required">Date <input id="shift_date" type="date"></label>
        <label class="required">Shift
          <select id="shift_type">
            <option value="D/S">D/S</option>
            <option value="N/S">N/S</option>
          </select>
        </label>
        <label class="required">Operator <input id="operator" type="text" placeholder="Operator name"></label>
        <label>Shift Boss <input id="shift_boss" type="text"></label>
        <label>Plant Operator <input id="plant_operator" type="text"></label>
        <label>Paste Runner <input id="paste_runner" type="text"></label>
      </div>
    </section>
    <section class="card">
      <h2>Stopes</h2>
      <div class="stope-grid">
        <div class="stope">
          <h3>Stope 1</h3>
          <input id="stope_1_id" placeholder="Stope ID">
          <input id="stope_1_status" placeholder="Status">
          <input id="stope_1_total" placeholder="Total m³">

          <div class="stope-divider">Checks &amp; Details</div>
          <div class="stope-fields">
            <label>Stope ID <input id="stope1_id" type="text" placeholder="Stope ID"></label>
            <label>Status
              <select id="stope1_status">
              <option value="">Select…</option>
              <option value="Complete">Complete</option>
              <option value="Ongoing">Ongoing</option>
              <option value="Stopped">Stopped</option>
              <option value="Not Started">Not Started</option>
              </select>
            </label>
            <label>Level of Fill Point <input id="stope1_fill_point" type="text" placeholder="e.g. 2.5m"></label>
            <label>Total m³ <input id="stope1_total_m3" type="number" step="0.1" placeholder="0.0"></label>
            <label>Plug m³ <input id="stope1_plug_m3" type="number" step="0.1" placeholder="0.0"></label>
            <label>Poured m³ <input id="stope1_poured_m3" type="number" step="0.1" placeholder="0.0"></label>
            <label>Containment Zone
              <select id="stope1_containment_zone">
              <option value="">Select…</option>
              <option value="OK">OK</option>
              <option value="Requires Attention">Requires Attention</option>
              <option value="N/A">N/A</option>
              </select>
            </label>
            <label>Exclusion Zone
              <select id="stope1_exclusion_zone">
              <option value="">Select…</option>
              <option value="OK">OK</option>
              <option value="Requires Attention">Requires Attention</option>
              <option value="N/A">N/A</option>
              </select>
            </label>
            <label>Cameras
              <select id="stope1_cameras">
              <option value="">Select…</option>
              <option value="OK">OK</option>
              <option value="Requires Attention">Requires Attention</option>
              <option value="N/A">N/A</option>
              </select>
            </label>
            <label>Flush Valve
              <select id="stope1_flush_valve">
              <option value="">Select…</option>
              <option value="OK">OK</option>
              <option value="Requires Attention">Requires Attention</option>
              <option value="N/A">N/A</option>
              </select>
            </label>
            <label>Signage
              <select id="stope1_signage">
              <option value="">Select…</option>
              <option value="OK">OK</option>
              <option value="Requires Attention">Requires Attention</option>
              <option value="N/A">N/A</option>
              </select>
            </label>
            <label>Wall Status
              <select id="stope1_wall_status">
              <option value="">Select…</option>
              <option value="OK">OK</option>
              <option value="Requires Attention">Requires Attention</option>
              <option value="N/A">N/A</option>
              </select>
            </label>
            <label>Bund Status
              <select id="stope1_bund_status">
              <option value="">Select…</option>
              <option value="OK">OK</option>
              <option value="Requires Attention">Requires Attention</option>
              <option value="N/A">N/A</option>
              </select>
            </label>
            <label>Changeover Points
              <select id="stope1_changeover_points">
              <option value="">Select…</option>
              <option value="OK">OK</option>
              <option value="Requires Attention">Requires Attention</option>
              <option value="N/A">N/A</option>
              </select>
            </label>
          </div>
          <label class="stope-comments">Comments <textarea id="stope1_comments" placeholder="Notes for Stope 1"></textarea></label>

              <option value="OK">OK</option>
              <option value="Requires Attention">Requires Attention</option>
              <option value="N/A">N/A</option>
              </select>
            </label>
            <label>Exclusion Zone
              <select id="stope2_exclusion_zone">
              <option value="">Select…</option>
              <option value="OK">OK</option>
              <option value="Requires Attention">Requires Attention</option>
              <option value="N/A">N/A</option>
              </select>
            </label>
            <label>Cameras

              </select>
            </label>
          </div>
          <label class="stope-comments">Comments <textarea id="stope2_comments" placeholder="Notes for Stope 2"></textarea></label>

            <label>Exclusion Zone

            <label>Signage

            <label>Wall Status

      </div>
    </section>
    <section class="card">
      <h2>Times & Notes</h2>
      <div class="grid">
        <label class="required">Started Pouring <input id="started_pouring" type="time"></label>
        <label class="required">Finished Pouring <input id="finished_pouring" type="time"></label>
      </div>
      <label style="margin-top:14px;">Comments <textarea id="comments" placeholder="Shift comments"></textarea></label>
    </section>
    <section class="submit-card">
      <button id="submitBtn" class="btn primary">Submit Shift Sheet</button>
      <div id="status" class="status"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
